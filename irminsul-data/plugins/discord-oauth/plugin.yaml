name: Discord OAuth
version: 1.0.0
description: 使用 Discord 账号绑定和快捷登录
author: irminsul
hooks:
  - oauth:provider
  - oauth:authorize
  - oauth:exchange-token
  - oauth:fetch-profile
  - oauth:map-profile
config:
  - key: callbackUrl
    label: OAuth Callback URL
    type: oauth-callback-url
    description: 在 Discord Developer Portal 的 OAuth2 设置中，将此 URL 添加到 "Redirects"
    url: https://discord.com/developers/applications
  - key: clientId
    label: Client ID
    type: text
    required: true
    description: Discord 应用的 Client ID（在 OAuth2 页面可找到）
  - key: clientSecret
    label: Client Secret
    type: password
    required: true
    description: Discord 应用的 Client Secret
